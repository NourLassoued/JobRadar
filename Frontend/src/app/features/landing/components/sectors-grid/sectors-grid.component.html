<section class="px-7 py-10 bg-white">
  <div class="max-w-6xl mx-auto">

    <!-- En-tête de section -->
    <div class="text-center mb-6">
      <h2 class="text-2xl font-medium tracking-tight mb-1 text-ink">
        14 familles de métiers, un seul outil
      </h2>
      <p class="text-sm text-muted">
        Du référentiel ROME France Travail — pas que de la tech.
      </p>
    </div>

    <!-- Grille des secteurs -->
    <div class="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-7 gap-2">
      @for (s of sectors; track s.id) {
        <button
          type="button"
          [class]="'sector-tile ' + s.bg"
          [attr.aria-label]="'Voir les offres ' + s.label">
          <i class="ti text-2xl" [class]="s.icon + ' ' + s.text"></i>
          <div class="text-[10px] mt-1 font-medium" [class]="s.text">
            {{ s.label }}
          </div>
        </button>
      }
    </div>
  </div>
</section>
