spring.application.name=jobradar

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/jobradar
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Serveur
server.port=8080

# JWT
jobradar.jwt.secret=maCleSecreteSuperLongueDeAuMoins256BitsPourEviterLesProblemesDeSecurite123456
jobradar.jwt.expiration=86400000

# Logs
logging.level.jobradarbackend.jobradar=DEBUG